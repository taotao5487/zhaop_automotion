services:
  wechat-api:
    image: tmwgsicp/wechat-download-api:latest
    container_name: wechat-download-api
    restart: unless-stopped
    working_dir: /app
    command:
      - sh
      - -lc
      - |
        python -c "import PIL" >/dev/null 2>&1 || pip install --no-cache-dir 'Pillow>=10.0.0'
        exec python app.py
    ports:
      - "5001:5000"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - TZ=Asia/Shanghai
      - HOST=0.0.0.0
      - PORT=5000
      - DEBUG=false
    dns:
      - 223.5.5.5
      - 114.114.114.114
